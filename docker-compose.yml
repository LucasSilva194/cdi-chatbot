services:
  postgres:
    image: postgres:16-alpine
    container_name: cdi-chatbot-postgres
    environment:
      POSTGRES_DB: cdi_chatbot
      POSTGRES_USER: cdi
      POSTGRES_PASSWORD: cdi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdi -d cdi_chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cdi-chatbot-redis
    profiles:
      - redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    container_name: cdi-chatbot-api
    profiles:
      - app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cdi_chatbot
      SPRING_DATASOURCE_USERNAME: cdi
      SPRING_DATASOURCE_PASSWORD: cdi
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:4173
      APP_CONVERSATION_STATE_STORE: memory
      APP_CONVERSATION_STATE_TTL: PT2H
      SHOPIFY_ADMIN_API_SCOPES: read_customers,read_orders,read_products
    ports:
      - "8080:8080"

  ui:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: cdi-chatbot-ui
    profiles:
      - app
    depends_on:
      - api
    ports:
      - "4173:80"

volumes:
  postgres_data:
