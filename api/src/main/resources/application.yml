spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: cdi-chatbot-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cdi_chatbot}
    username: ${SPRING_DATASOURCE_USERNAME:cdi}
    password: ${SPRING_DATASOURCE_PASSWORD:cdi}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
