spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: cdi-chatbot-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cdi_chatbot}
    username: ${SPRING_DATASOURCE_USERNAME:cdi}
    password: ${SPRING_DATASOURCE_PASSWORD:cdi}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  conversation-state:
    store: ${APP_CONVERSATION_STATE_STORE:memory}
    ttl: ${APP_CONVERSATION_STATE_TTL:PT2H}
